name: Docker Image CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Login to GitHub Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build the Docker image from the checkout
      run: docker build . --file Dockerfile --tag ghcr.io/manykarim/robotframework-doctestlibrary/rf-doctest:$(date +%s) --tag ghcr.io/manykarim/robotframework-doctestlibrary/rf-doctest:latest
    - name: Smoke-test the image
      run: docker run --rm ghcr.io/manykarim/robotframework-doctestlibrary/rf-doctest:latest python -c "import DocTest.VisualTest; print('image ok')"
    - name: Push the latest Docker image
      if: github.event_name == 'push'
      run: docker push ghcr.io/manykarim/robotframework-doctestlibrary/rf-doctest:latest
