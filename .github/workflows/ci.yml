name: CI

# pull_request covers PR branches; push only on main — otherwise every PR
# commit runs the whole pipeline twice (doubling cost and exposure to
# live-LLM test flakiness).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-no-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Packages and Binaries
        run: |
          sudo apt-get update
          echo "Install Dependencies via apt"
          sudo apt-get install -y imagemagick tesseract-ocr ghostscript libdmtx0b libzbar0
          echo "Download Ghostscript and GhostPCL"
          export release_name=gs9561
          export archive_name=ghostpcl-9.56.1-linux-x86_64
          wget https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/${release_name}/${archive_name}.tgz
          tar -xvzf ${archive_name}.tgz
          chmod +x ${archive_name}/gpcl6*
          cp ${archive_name}/gpcl6* ${archive_name}/pcl6
          sudo cp ${archive_name}/* /usr/bin
          sudo cp policy.xml /etc/ImageMagick-6/
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install base dependencies (without AI extras)
        run: uv sync
      - name: Run smoke end-to-end tests without AI extras
        run: |
          uv run robot \
            --loglevel=TRACE:INFO \
            --listener RobotStackTracer \
            --xunit xunit.xml \
            -d results-smoke \
            atest/Compare.robot \
            atest/PdfContent.robot \
            atest/ReferenceRun.robot \
            atest/ResultJson.robot
      - name: Store Smoke Artifacts
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: smoke-results
          path: |
            results-smoke/*.html
            results-smoke/output.xml
            results-smoke/xunit.xml
      - name: Smoke Test Report
        uses: dorny/test-reporter@main
        if: success() || failure()
        with:
          name: Smoke Tests
          path: results-smoke/xunit.xml
          reporter: java-junit

  test:
    needs: smoke-no-ai
    env:
      DOCTEST_LLM_MODEL: ${{ vars.DOCTEST_LLM_MODEL }}
      DOCTEST_LLM_VISION_MODEL: ${{ vars.DOCTEST_LLM_VISION_MODEL }}
      DOCTEST_LLM_PROVIDER: ${{ vars.DOCTEST_LLM_PROVIDER }}
      DOCTEST_LLM_ENABLED: true
      DOCTEST_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      DOCTEST_LLM_BASE_URL: https://openrouter.ai/api/v1
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Packages and Binaries
        run: |
          sudo apt-get update
          echo "Install Dependencies via apt"
          sudo apt-get install -y imagemagick tesseract-ocr ghostscript libdmtx0b libzbar0
          echo "Download Ghostscript and GhostPCL"
          export release_name=gs9561
          export archive_name=ghostpcl-9.56.1-linux-x86_64
          wget https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/${release_name}/${archive_name}.tgz
          tar -xvzf ${archive_name}.tgz
          chmod +x ${archive_name}/gpcl6*
          cp ${archive_name}/gpcl6* ${archive_name}/pcl6
          sudo cp ${archive_name}/* /usr/bin
          sudo cp policy.xml /etc/ImageMagick-6/
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (all extras)
        run: uv sync --all-extras --python ${{ matrix.python-version }}
      - name: Audit resolved dependency versions
        run: uv run python scripts/audit_resolved_versions.py
      - name: Run tests
        run: |
          uv run invoke tests
      - name: Store Artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: test-results ${{ matrix.python-version }} # Choose a descriptive name for your artifact
          path: |
            results/*.html
            results/*.xml
            results/htmlcov/
            results/*.prof
            results/*.txt
            results/screenshots/
      - name: Test Report
        uses: dorny/test-reporter@main
        if: success() || failure() # run this step even if previous step failed
        with:
          name: xUnit Tests ${{ matrix.python-version }} # Name of the check run which will be created
          path: results/pytest.xml,results/xunit.xml # Path to test results
          reporter: java-junit # Format of test results

  dashboard:
    needs: smoke-no-ai
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Packages and Binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick tesseract-ocr ghostscript libdmtx0b libzbar0
          sudo cp policy.xml /etc/ImageMagick-6/
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build
      - name: Sync environment (all extras)
        run: uv sync --all-extras
      - name: Backend tests
        run: uv run pytest utest/dashboard -v
      - name: Wheel parity gate
        run: |
          uv build
          uv run python scripts/compare_wheel_contents.py dist/*.whl --sdist dist/*.tar.gz
      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps
      - name: End-to-end journeys
        run: uv run pytest e2e -v --browser chromium
