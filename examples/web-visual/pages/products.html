</style></head><body>

<div class="product"><div class="swatch" style="background:#34d399"></div><h3>Beta</h3><p>€29</p></div>
<div class="product"><div class="swatch" style="background:#f472b6"></div><h3>Gamma</h3><p>€39</p></div>
<div class="product"><div class="swatch" style="background:#fbbf24"></div><h3>Delta</h3><p>€49</p></div>
</div>
</body></html>
